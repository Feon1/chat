<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Simple Chat</title>
    <!-- Добавлен viewport-fit=cover для учета особенностей экрана -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            /* Убираем общий скролл body, управление скроллом внутри #chatContainer */
            overflow: hidden;
        }

        /* Контейнер чата */
        #chatContainer {
            height: 100vh; /* Высота на 100% вьюпорта */
            overflow-y: auto; /* Добавляем скролл только внутри чата */
            padding: 10px;
            /* Учет безопасной зоны (например, для "чёлки") */
            padding-top: env(safe-area-inset-top, 0);
            /* Учет нижней безопасной зоны и высоты фиксированного футера */
            padding-bottom: calc(10px + env(safe-area-inset-bottom, 0) + 80px); /* 80px - примерная высота футера */
            /* Учет боковых безопасных зон */
            padding-left: env(safe-area-inset-left, 0);
            padding-right: env(safe-area-inset-right, 0);
            /* Псевдоэлемент для корректного скролла к новым сообщениям */
            scroll-behavior: smooth;
        }

        #messages {
            list-style-type: none;
            padding: 0;
        }

        #messages li {
            margin-bottom: 10px;
            word-wrap: break-word;
        }

        /* Контейнер ввода */
        #inputContainer {
            display: flex;
            gap: 5px;
            padding: 10px;
            background-color: #f0f0f0;
            /* Фиксируем контейнер ввода внизу */
            position: fixed;
            bottom: 40px; /* Размещаем над футером */
            left: 0;
            right: 0;
            box-sizing: border-box;
            align-items: center;
            /* Учет боковых безопасных зон */
            padding-left: env(safe-area-inset-left, 0);
            padding-right: env(safe-area-inset-right, 0);
            z-index: 100; /* Выше основного контента */
        }

        #messageInput {
            flex: 1; /* Поле ввода занимает всё доступное место */
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 8px 12px;
            border: none;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* Футер - фиксируем внизу */
        #footer {
            position: fixed; /* Фиксируем футер внизу экрана */
            bottom: 0; /* Прижимаем к низу */
            left: 0;
            right: 0;
            text-align: center;
            padding: 8px 10px;
            /* Учет безопасных зон */
            padding-left: env(safe-area-inset-left, 0);
            padding-right: env(safe-area-inset-right, 0);
            padding-bottom: max(env(safe-area-inset-bottom, 0), 10px); /* Минимальный отступ снизу */
            background-color: rgba(240, 240, 240, 0.95); /* Слегка прозрачный фон */
            backdrop-filter: blur(5px); /* Эффект размытия фона (опционально) */
            color: #666;
            font-size: 0.8em;
            z-index: 99; /* Ниже #inputContainer */
            box-shadow: 0 -1px 5px rgba(0,0,0,0.1); /* Легкая тень сверху */
            border-top: 1px solid #ddd; /* Легкая граница сверху */
        }

        #footer a {
            color: #007bff;
            text-decoration: none;
        }

        #footer a:hover {
            text-decoration: underline;
        }

        /* Дополнительно: Стилизация скроллбара (опционально) */
        #chatContainer::-webkit-scrollbar {
            width: 6px;
        }

        #chatContainer::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        #chatContainer::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }

        #chatContainer::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }

        /* --- Медиа-запрос для мобильных устройств (опционально, но полезно для уточнения стилей) --- */
        /* @media (max-width: 768px) {
            #chatContainer {
                padding-bottom: calc(10px + env(safe-area-inset-bottom, 0) + 80px);
            }
            #inputContainer {
                bottom: 40px; // Уже задано
            }
            #footer {
                // Уже задано
            }
        } */

    </style>
</head>
<body>
    <div id="chatContainer">
        <ul id="messages"></ul>
    </div>

    <div id="inputContainer">
        <input type="text" id="messageInput" placeholder="Введите сообщение..." />
        <button onclick="sendMessage()">Отправить</button>
    </div>

    <div id="footer">
        <a href="/privacy">Политика конфиденциальности</a> |
        <a href="/terms">Условия использования</a> |
        <span>© 2024 Simple Chat</span>
    </div>

    <script>
        // Пример функции для добавления сообщений (вам нужно заменить это на реальную логику WebSocket)
        function addMessage(message) {
            const messagesList = document.getElementById('messages');
            const messageItem = document.createElement('li');
            messageItem.textContent = message;
            messagesList.appendChild(messageItem);

            // Прокручиваем вниз после добавления сообщения
            messagesList.scrollTop = messagesList.scrollHeight;
        }

        // Пример функции отправки сообщения
        function sendMessage() {
            const inputElement = document.getElementById('messageInput');
            const messageText = inputElement.value.trim();
            if (!messageText) return;

            // Добавляем сообщение пользователя (временно)
            addMessage(`Вы: ${messageText}`);
            // Очищаем поле ввода
            inputElement.value = '';
            inputElement.focus(); // Фокус обратно на поле ввода

            // Здесь должна быть логика отправки через WebSocket
            // socket.send(JSON.stringify({type: 'message', data: messageText}));
        }

        // Обработка нажатия Enter в поле ввода
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Пример получения сообщения (это будете делать вы при получении от WebSocket)
        // addMessage("Привет от ИИ!");

        // --- Дополнительная логика для оптимизации при открытии клавиатуры на мобильных ---
        // Это не гарантирует срабатывание на всех устройствах, но может помочь
        let initialViewportHeight = window.innerHeight;

        window.addEventListener('resize', function() {
            // Простая эвристика: если высота вьюпорта уменьшилась, возможно, открылась клавиатура
            const currentViewportHeight = window.innerHeight;
            const heightDifference = initialViewportHeight - currentViewportHeight;

            // Если разница больше порога (например, 150px), предполагаем открытие клавиатуры
            // и временно увеличиваем padding-bottom у #chatContainer
            const chatContainer = document.getElementById('chatContainer');
            const footerHeight = 80; // Примерная высота футера
            const keyboardThreshold = 150;

            if (heightDifference > keyboardThreshold) {
                // Увеличиваем отступ, чтобы освободить место под клавиатуру и футер
                // Это может быть не идеально, но попытка улучшить UX
                chatContainer.style.paddingBottom = `calc(10px + env(safe-area-inset-bottom, 0) + ${footerHeight}px + ${heightDifference}px)`;
                console.log("Клавиатура, возможно, открыта. Увеличен отступ.");
            } else {
                // Возвращаем к стандартному отступу
                chatContainer.style.paddingBottom = `calc(10px + env(safe-area-inset-bottom, 0) + ${footerHeight}px)`;
                console.log("Клавиатура, возможно, закрыта. Отступ возвращен.");
            }
        });


    </script>
</body>
</html>

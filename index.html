<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src *; frame-src *; img-src * data:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Феон на связи</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            
            /* Фоновая картинка */
            background-image: url('https://raw.githubusercontent.com/Feon1/chat/refs/heads/main/background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            /* Затемнение фона для читаемости текста */
            background-color: #000;
        }

        /* Затемняющий слой */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .info {
            text-align: center;
            padding: 40px 20px;
            flex-shrink: 0;
        }

        .info h2 {
            font-size: 36px;
            font-weight: 700;
            margin: 0 0 16px 0;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8), 0 0 30px rgba(0, 0, 0, 0.5);
            letter-spacing: 1px;
        }

        .info p {
            font-size: 18px;
            margin: 0;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 0, 0, 0.5);
            line-height: 1.5;
            font-weight: 500;
        }

        .arrow {
            display: inline-block;
            margin-top: 12px;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(8px); }
        }

        /* Адаптация для мобильных */
        @media (max-width: 480px) {
            .info {
                padding: 30px 16px;
            }
            .info h2 {
                font-size: 26px;
            }
            .info p {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="info">
            <h2>Феон на связи 🟢</h2>
            <p>Для чата нажмите на значок.</p>
            <div class="arrow">👇</div>
        </div>
    </div>

    <script
      src="https://cdn.btmn.io/webchat/v1/loader.js"
      data-webchat-id="185e85da840b"
      async
    ></script>
</body>
</html>

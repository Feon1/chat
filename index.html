<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Феон на связи</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2E7D32">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            background-image: url('https://raw.githubusercontent.com/Feon1/chat/refs/heads/main/background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .info {
            text-align: center;
            padding: 40px 20px;
        }

        .status-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .indicator {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #4CAF50;
            box-shadow: 0 0 12px rgba(76, 175, 80, 0.8);
            flex-shrink: 0;
        }

        .indicator.offline {
            background: #f44336;
            box-shadow: 0 0 12px rgba(244, 67, 54, 0.8);
            animation: pulse-red 1.5s infinite;
        }

        .indicator.loading {
            background: #ff9800;
            box-shadow: 0 0 12px rgba(255, 152, 0, 0.8);
            animation: pulse-yellow 1s infinite;
        }

        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 8px rgba(244, 67, 54, 0.6); }
            50% { box-shadow: 0 0 20px rgba(244, 67, 54, 1); }
        }

        @keyframes pulse-yellow {
            0%, 100% { box-shadow: 0 0 8px rgba(255, 152, 0, 0.6); }
            50% { box-shadow: 0 0 20px rgba(255, 152, 0, 1); }
        }

        .info h2 {
            font-size: 36px;
            font-weight: 700;
            margin: 0;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            letter-spacing: 1px;
        }

        .info .status-text {
            font-size: 16px;
            margin: 0 0 20px 0;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
            font-weight: 500;
            min-height: 24px;
        }

        .info .status-text.offline-text {
            color: #ffcdd2;
        }

        .info .status-text.loading-text {
            color: #ffe0b2;
        }

        .chat-button {
            display: inline-block;
            font-size: 18px;
            color: #fff;
            font-weight: 600;
            text-decoration: none;
            padding: 16px 32px;
            border: 2px solid #fff;
            border-radius: 50px;
            background: rgba(76, 175, 80, 0.4);
            margin-top: 8px;
        }

        .chat-button:hover {
            background: rgba(76, 175, 80, 0.7);
        }

        .hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .info h2 {
                font-size: 26px;
            }
            .chat-button {
                font-size: 16px;
                padding: 14px 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="info">
            <div class="status-line">
                <div class="indicator loading" id="indicator"></div>
                <h2 id="title">Феон</h2>
            </div>
            
            <div class="status-text loading-text" id="statusText">Чат загружается...</div>
            
            <!-- Кнопка ВК (показывается всегда, если чат не загрузился) -->
            <a href="https://vk.com/club136655585" target="_blank" class="chat-button" id="vkButton">
                💬 Написать в ВК
            </a>
        </div>
    </div>

    <!-- BotMan -->
    <script src="https://cdn.btmn.io/webchat/v1/loader.js" data-webchat-id="185e85da840b" async></script>

    <script>
    (function() {
        var indicator = document.getElementById('indicator');
        var title = document.getElementById('title');
        var statusText = document.getElementById('statusText');
        var vkButton = document.getElementById('vkButton');
        var wasOffline = false;
        var chatLoaded = false;
        var checkCount = 0;

        function setConnected() {
            chatLoaded = true;
            wasOffline = false;
            indicator.classList.remove('loading', 'offline');
            indicator.style.background = '#4CAF50';
            title.innerHTML = 'Феон на связи';
            statusText.textContent = 'Соединение установлено';
            statusText.classList.remove('offline-text', 'loading-text');
            vkButton.classList.add('hidden');
        }

        function setOffline() {
            wasOffline = true;
            chatLoaded = false;
            indicator.classList.add('offline');
            indicator.classList.remove('loading');
            title.innerHTML = 'Феон офлайн';
            statusText.textContent = 'Отсутствует соединение';
            statusText.classList.add('offline-text');
            statusText.classList.remove('loading-text');
            vkButton.classList.remove('hidden');
        }

        function setLoading() {
            indicator.classList.remove('offline');
            indicator.classList.add('loading');
            title.innerHTML = 'Феон';
            statusText.textContent = 'Чат загружается...';
            statusText.classList.remove('offline-text');
            statusText.classList.add('loading-text');
            vkButton.classList.remove('hidden');
        }

        function checkChatLoaded() {
            var iframes = document.querySelectorAll('iframe');
            for (var i = 0; i < iframes.length; i++) {
                if (iframes[i].src && iframes[i].src.indexOf('btmn') !== -1) {
                    return true;
                }
            }
            return false;
        }

        function pingServer(callback) {
            var xhr = new XMLHttpRequest();
            xhr.open('HEAD', 'https://feon1.github.io/chat/manifest.json?t=' + Date.now(), true);
            xhr.timeout = 5000;
            xhr.onload = function() { callback(true); };
            xhr.onerror = function() { callback(false); };
            xhr.ontimeout = function() { callback(false); };
            try { xhr.send(); } catch(e) { callback(false); }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/chat/sw.js').catch(function(){});
        }

        pingServer(function(online) {
            if (!online) setOffline();
        });

        // Проверка чата
        var chatInterval = setInterval(function() {
            if (chatLoaded) {
                clearInterval(chatInterval);
                return;
            }
            if (wasOffline) return;
            checkCount++;
            if (checkChatLoaded()) {
                setConnected();
                clearInterval(chatInterval);
            } else if (checkCount >= 15) {
                statusText.textContent = 'Напишите нам в ВК';
                statusText.classList.add('offline-text');
                indicator.classList.add('offline');
                indicator.classList.remove('loading');
                clearInterval(chatInterval);
            }
        }, 1000);

        // Проверка сети
        setInterval(function() {
            pingServer(function(online) {
                if (!online && !wasOffline) setOffline();
                else if (online && wasOffline) location.reload();
            });
        }, 5000);

        window.addEventListener('offline', function() { setOffline(); });
        window.addEventListener('online', function() {
            setTimeout(function() {
                pingServer(function(online) {
                    if (online && wasOffline) location.reload();
                });
            }, 1000);
        });
    })();
    </script>
</body>
</html>

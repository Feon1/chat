<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Феон на связи</title>
    <meta name="theme-color" content="#2E7D32">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            background-image: url('https://raw.githubusercontent.com/Feon1/chat/refs/heads/main/background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .info {
            text-align: center;
            padding: 40px 20px;
        }

        .status-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .indicator {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #4CAF50;
            box-shadow: 0 0 12px rgba(76, 175, 80, 0.8);
            flex-shrink: 0;
        }

        .indicator.offline {
            background: #f44336;
            box-shadow: 0 0 12px rgba(244, 67, 54, 0.8);
            animation: pulse-red 1.5s infinite;
        }

        .indicator.loading {
            background: #ff9800;
            box-shadow: 0 0 12px rgba(255, 152, 0, 0.8);
            animation: pulse-yellow 1s infinite;
        }

        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 8px rgba(244, 67, 54, 0.6); }
            50% { box-shadow: 0 0 20px rgba(244, 67, 54, 1); }
        }

        @keyframes pulse-yellow {
            0%, 100% { box-shadow: 0 0 8px rgba(255, 152, 0, 0.6); }
            50% { box-shadow: 0 0 20px rgba(255, 152, 0, 1); }
        }

        .info h2 {
            font-size: 36px;
            font-weight: 700;
            margin: 0;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            letter-spacing: 1px;
        }

        .info .status-text {
            font-size: 16px;
            margin: 0 0 8px 0;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
            font-weight: 500;
            min-height: 24px;
        }

        .info .status-text.offline-text {
            color: #ffcdd2;
        }

        .info .status-text.loading-text {
            color: #ffe0b2;
        }

        .info .hint-text {
            font-size: 14px;
            margin: 0 0 16px 0;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
            font-weight: 500;
            min-height: 20px;
        }

        .chat-button {
            display: inline-block;
            font-size: 18px;
            color: #fff;
            font-weight: 600;
            text-decoration: none;
            padding: 16px 32px;
            border: 2px solid #fff;
            border-radius: 50px;
            background: rgba(76, 175, 80, 0.4);
            margin-top: 8px;
        }

        .chat-button:hover {
            background: rgba(76, 175, 80, 0.7);
        }

        .hidden {
            display: none;
        }

        .footer-email {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            font-size: 14px;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
            font-weight: 500;
            text-decoration: none;
            opacity: 0.8;
        }

        .footer-email:hover {
            opacity: 1;
        }

        @media (max-width: 480px) {
            .info h2 {
                font-size: 26px;
            }
            .chat-button {
                font-size: 16px;
                padding: 14px 28px;
            }
            .footer-email {
                font-size: 12px;
                bottom: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="info">
            <div class="status-line">
                <div class="indicator loading" id="indicator"></div>
                <h2 id="title">Феон</h2>
            </div>
            
            <div class="status-text loading-text" id="statusText">Проверка соединения...</div>
            
            <div class="hint-text hidden" id="hintText">Нажмите на значок чата</div>
            
            <a href="https://vk.com/club136655585" target="_blank" class="chat-button hidden" id="vkButton">
                💬 Написать в ВК
            </a>
        </div>
    </div>

    <a href="mailto:feon5upport@ya.ru" class="footer-email">support:feon5upport@ya.ru</a>

    <script>
    (function() {
        // Очистка
        try { localStorage.clear(); } catch(e) {}
        try { sessionStorage.clear(); } catch(e) {}
        var cookies = document.cookie.split(';');
        for (var i = 0; i < cookies.length; i++) {
            var cookie = cookies[i];
            var eqPos = cookie.indexOf('=');
            var name = eqPos > -1 ? cookie.substr(0, eqPos).trim() : cookie.trim();
            document.cookie = name + '=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/';
            document.cookie = name + '=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/chat/';
        }

        var indicator = document.getElementById('indicator');
        var title = document.getElementById('title');
        var statusText = document.getElementById('statusText');
        var hintText = document.getElementById('hintText');
        var vkButton = document.getElementById('vkButton');
        var wasOffline = false;
        var widgetFound = false;

        function checkWidget() {
            if (widgetFound) return;
            var iframes = document.querySelectorAll('iframe');
            for (var i = 0; i < iframes.length; i++) {
                if (iframes[i].src && iframes[i].src.indexOf('btmn') !== -1) {
                    widgetFound = true;
                    indicator.classList.remove('loading', 'offline');
                    indicator.style.background = '#4CAF50';
                    indicator.style.boxShadow = '0 0 12px rgba(76, 175, 80, 0.8)';
                    title.innerHTML = 'Феон на связи';
                    statusText.textContent = 'Соединение установлено';
                    statusText.classList.remove('offline-text', 'loading-text');
                    hintText.classList.remove('hidden');
                    vkButton.classList.add('hidden');
                    return;
                }
            }
        }

        function showOnlineNoBotman() {
            indicator.classList.remove('loading', 'offline');
            indicator.style.background = '#4CAF50';
            indicator.style.boxShadow = '0 0 12px rgba(76, 175, 80, 0.8)';
            title.innerHTML = 'Феон на связи';
            statusText.textContent = 'Соединение установлено';
            statusText.classList.remove('offline-text', 'loading-text');
            hintText.classList.add('hidden');
            vkButton.classList.remove('hidden');
        }

        function showOffline() {
            wasOffline = true;
            indicator.classList.add('offline');
            indicator.classList.remove('loading');
            indicator.style.background = '#f44336';
            indicator.style.boxShadow = '0 0 12px rgba(244, 67, 54, 0.8)';
            title.innerHTML = 'Феон офлайн';
            statusText.textContent = 'Отсутствует соединение';
            statusText.classList.add('offline-text');
            statusText.classList.remove('loading-text');
            hintText.classList.add('hidden');
            vkButton.classList.add('hidden');
        }

        function pingInternet(callback) {
            var xhr = new XMLHttpRequest();
            xhr.open('HEAD', 'https://feon1.github.io/chat/index.html?nocache=' + Date.now(), true);
            xhr.timeout = 5000;
            xhr.onload = function() { callback(true); };
            xhr.onerror = function() { callback(false); };
            xhr.ontimeout = function() { callback(false); };
            try { xhr.send(); } catch(e) { callback(false); }
        }

        // Старт
        pingInternet(function(online) {
            if (!online) {
                showOffline();
                return;
            }
            statusText.textContent = 'Чат загружается...';
            statusText.classList.add('loading-text');
        });

        // Проверяем виджет каждую секунду
        var checkCount = 0;
        var widgetInterval = setInterval(function() {
            if (wasOffline) return;
            checkWidget();
            if (widgetFound) {
                clearInterval(widgetInterval);
            } else {
                checkCount++;
                if (checkCount >= 30) {
                    clearInterval(widgetInterval);
                    if (!widgetFound) {
                        showOnlineNoBotman();
                    }
                }
            }
        }, 1000);

        // Проверка сети
        setInterval(function() {
            pingInternet(function(online) {
                if (!online && !wasOffline) {
                    showOffline();
                } else if (online && wasOffline) {
                    location.reload();
                }
            });
        }, 5000);

        window.addEventListener('offline', function() { showOffline(); });
        window.addEventListener('online', function() {
            setTimeout(function() {
                pingInternet(function(online) {
                    if (online && wasOffline) location.reload();
                });
            }, 1000);
        });
    })();
    </script>

    <!-- Виджет BotMan -->
    <script src="https://cdn.btmn.io/webchat/v1/loader.js" data-webchat-id="185e85da840b" async></script>
</body>
</html>

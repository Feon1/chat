<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src *; frame-src *; img-src * data:;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Феон на связи</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            
            /* Фон */
            background-image: url('https://raw.githubusercontent.com/Feon1/chat/refs/heads/main/background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* Затемнение */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .info {
            text-align: center;
            padding: 40px 20px;
        }

        .info h2 {
            font-size: 36px;
            font-weight: 700;
            margin: 0 0 16px 0;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            letter-spacing: 1px;
        }

        .info p {
            font-size: 18px;
            margin: 0 0 24px 0;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
            line-height: 1.5;
            font-weight: 500;
        }

        /* Кнопка чата */
        .chat-button {
            display: inline-block;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        .chat-button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.5);
        }

        .chat-button:active {
            transform: scale(0.98);
        }

        /* Скрываем стандартный значок BotMan */
        iframe[src*="btmn"] {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* Когда чат открыт — показываем */
        .chat-open iframe[src*="btmn"] {
            opacity: 1 !important;
            pointer-events: auto !important;
        }

        /* Адаптация для мобильных */
        @media (max-width: 480px) {
            .info {
                padding: 30px 16px;
            }
            .info h2 {
                font-size: 26px;
            }
            .info p {
                font-size: 15px;
            }
            .chat-button {
                padding: 14px 32px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="info">
            <h2>Феон на связи 🟢</h2>
            <p>Готовы ответить на ваши вопросы</p>
            <button class="chat-button" onclick="openChat()">
                💬 Написать в чат
            </button>
        </div>
    </div>

    <script
      src="https://cdn.btmn.io/webchat/v1/loader.js"
      data-webchat-id="185e85da840b"
      async
    ></script>

    <script>
    function openChat() {
        // Пробуем найти и кликнуть по кнопке BotMan
        setTimeout(function() {
            var chatIframe = document.querySelector('iframe[src*="btmn"]');
            if (chatIframe) {
                // Делаем iframe видимым и кликабельным
                document.body.classList.add('chat-open');
                
                // Пробуем сфокусироваться на iframe
                chatIframe.focus();
                
                // Отправляем сообщение в iframe (если BotMan поддерживает)
                chatIframe.contentWindow.postMessage({ type: 'open' }, '*');
            }
        }, 500);
    }
    </script>
</body>
</html>

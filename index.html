<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Феон - Статус</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', 'Noto Sans Mono', sans-serif;
            background: url('https://raw.githubusercontent.com/Feon1/chat/main/background.jpg') center/cover fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        .widget-container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status-indicator {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .status-indicator::before {
            content: '';
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ffa500;
            box-shadow: 0 0 0 0 rgba(255, 165, 0, 0.7);
            animation: pulse-orange 2s infinite;
        }

        .status-indicator.loading::before {
            background: #ffa500;
            box-shadow: 0 0 0 0 rgba(255, 165, 0, 0.7);
            animation: pulse-orange 2s infinite;
        }

        .status-indicator.online::before {
            background: #4CAF50;
            box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7);
            animation: pulse-green 2s infinite;
        }

        .status-indicator.offline::before {
            background: #f44336;
            box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.7);
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-orange {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(255, 165, 0, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 20px rgba(255, 165, 0, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(255, 165, 0, 0);
            }
        }

        @keyframes pulse-green {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 20px rgba(76, 175, 80, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(76, 175, 80, 0);
            }
        }

        @keyframes pulse-red {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 20px rgba(244, 67, 54, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(244, 67, 54, 0);
            }
        }

        h1 {
            color: #fff;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            font-weight: 700;
        }

        .status-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1em;
            margin-bottom: 30px;
            text-shadow: 0 1px 5px rgba(0, 0, 0, 0.3);
        }

        .loading-text {
            color: #ffa500;
            font-weight: 600;
        }

        .online-text {
            color: #4CAF50;
            font-weight: 600;
        }

        .offline-text {
            color: #f44336;
            font-weight: 600;
        }

        .hint-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
            margin-bottom: 25px;
            font-style: italic;
        }

        .hidden {
            display: none !important;
        }

        .chat-button {
            display: inline-block;
            padding: 15px 40px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .chat-button:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .chat-button:active {
            transform: translateY(0);
        }

        footer {
            position: relative;
            z-index: 1;
            margin-top: 40px;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85em;
        }

        footer a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: color 0.3s;
        }

        footer a:hover {
            color: #fff;
            text-decoration: underline;
        }

        .footer-donate {
            color: #ff6b6b;
            font-weight: 600;
        }

        .footer-divider {
            margin: 0 10px;
            opacity: 0.5;
        }

        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(5px);
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loader-text {
            color: #fff;
            margin-top: 20px;
            font-size: 1.1em;
            text-align: center;
        }

        .loader-text small {
            display: block;
            margin-top: 10px;
            font-size: 0.85em;
            opacity: 0.7;
        }

        @media (max-width: 480px) {
            .widget-container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2em;
            }

            .status-indicator {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="loader-overlay" id="loaderOverlay">
        <div class="loader-spinner"></div>
        <div class="loader-text">
            Загрузка чата...
            <small>Пожалуйста, подождите</small>
        </div>
    </div>

    <div class="widget-container">
        <div class="status-indicator loading" id="statusIndicator"></div>
        <h1>Феон</h1>
        <div class="status-text loading-text" id="statusText">Проверка соединения...</div>
        <div class="hint-text hidden" id="hintText">Нажмите на значок чата</div>
        <a href="https://vk.com/club136655585" target="_blank" class="chat-button hidden" id="vkButton">
            💬 Написать в ВК
        </a>
    </div>

    <footer>
        <span class="footer-donate">❤️ Donate</span>
        <span class="footer-divider">|</span>
        <a href="https://yoomoney.ru/to/4100119548371455" target="_blank" class="footer-link">💳 ЮMoney: 4100119548371455</a>
        <span class="footer-divider">|</span>
        <a href="mailto:feon.5upport@ya.ru" class="footer-link">📧 support:feon.5upport@ya.ru</a>
    </footer>

    <script>
        // Проверка статуса соединения
        async function checkStatus() {
            const statusIndicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            const hintText = document.getElementById('hintText');
            const vkButton = document.getElementById('vkButton');
            const loaderOverlay = document.getElementById('loaderOverlay');

            try {
                // Имитация проверки соединения
                await new Promise(resolve => setTimeout(resolve, 1500));

                // Проверяем доступность VK группы
                const vkUrl = 'https://vk.com/club136655585';
                
                // Простая проверка доступности
                const checkVK = await fetch(vkUrl, { 
                    method: 'HEAD',
                    mode: 'no-cors'
                }).then(() => true).catch(() => false);

                if (checkVK) {
                    // Онлайн
                    statusIndicator.className = 'status-indicator online';
                    statusText.className = 'status-text online-text';
                    statusText.textContent = 'Феон на связи';
                    hintText.classList.remove('hidden');
                    vkButton.classList.remove('hidden');
                } else {
                    // Офлайн
                    statusIndicator.className = 'status-indicator offline';
                    statusText.className = 'status-text offline-text';
                    statusText.textContent = 'Временно недоступен';
                }

            } catch (error) {
                console.error('Ошибка проверки статуса:', error);
                statusIndicator.className = 'status-indicator offline';
                statusText.className = 'status-text offline-text';
                statusText.textContent = 'Ошибка соединения';
            } finally {
                // Скрываем загрузчик
                setTimeout(() => {
                    loaderOverlay.style.opacity = '0';
                    setTimeout(() => {
                        loaderOverlay.classList.add('hidden');
                    }, 300);
                }, 500);
            }
        }

        // Запускаем проверку при загрузке страницы
        window.addEventListener('load', checkStatus);

        // Перепроверка каждые 30 секунд
        setInterval(checkStatus, 30000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Феон | Админ-панель</title>
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --bg-input: #0f3460;
            --accent: #667eea;
            --accent-hover: #764ba2;
            --text-main: #eaeaea;
            --text-muted: #8892b0;
            --danger: #e74c3c;
            --success: #2ecc71;
            --warning: #f39c12;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Nunito', 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; }

        /* === ЭКРАН ВХОДА === */
        .login-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(26, 26, 46, 0.95); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .login-box {
            background: var(--bg-card); padding: 40px; border-radius: 16px;
            width: 90%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid var(--border); text-align: center;
        }
        .login-box h2 { color: var(--accent); margin-bottom: 25px; font-size: 24px; }
        .login-input {
            width: 100%; padding: 14px; background: var(--bg-input);
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text-main); font-size: 15px; margin-bottom: 15px;
        }
        .login-input:focus { outline: none; border-color: var(--accent); }
        .remember-me {
            display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
            color: var(--text-muted); cursor: pointer; font-size: 14px; justify-content: center;
        }
        .remember-me input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); }
        .login-btn {
            width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .login-btn:hover { transform: translateY(-2px); }
        .login-error { color: var(--danger); margin-top: 15px; font-size: 14px; display: none; word-break: break-word; }

        /* === ОСНОВНОЙ ИНТЕРФЕЙС === */
        .admin-container { display: none; max-width: 1400px; margin: 0 auto; padding: 20px; }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 20px;
        }
        .header h1 { font-size: 22px; }
        .stats { display: flex; gap: 15px; flex-wrap: wrap; }
        .stat-box {
            background: var(--bg-card); padding: 12px 20px; border-radius: 12px;
            border: 1px solid var(--border); text-align: center;
        }
        .stat-box .number { font-size: 22px; font-weight: 700; color: var(--accent); }
        .stat-box .label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
        .logout-btn {
            background: rgba(231, 76, 60, 0.15); color: var(--danger);
            border: 1px solid rgba(231, 76, 60, 0.3); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; font-weight: 600;
        }
        .logout-btn:hover { background: var(--danger); color: white; }

        /* === ВКЛАДКИ === */
        .tabs {
            display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border);
        }
        .tab {
            padding: 12px 24px; background: transparent; border: none;
            color: var(--text-muted); cursor: pointer; font-size: 15px; font-weight: 600;
            border-bottom: 3px solid transparent; transition: all 0.2s;
        }
        .tab:hover { color: var(--text-main); }
        .tab.active {
            color: var(--accent); border-bottom-color: var(--accent);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* === ВКЛАДКА: ИСТОРИЯ ЧАТОВ === */
        .dashboard { display: grid; grid-template-columns: 350px 1fr; gap: 20px; height: calc(100vh - 240px); }
        .panel {
            background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .panel-header {
            padding: 15px 20px; border-bottom: 1px solid var(--border);
            font-weight: 600; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center;
        }
        .user-list, .knowledge-list { flex: 1; overflow-y: auto; }
        .user-item, .knowledge-item {
            padding: 15px 20px; border-bottom: 1px solid var(--border); cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }
        .user-item:hover, .knowledge-item:hover { background: rgba(102, 126, 234, 0.1); }
        .user-item.active { background: rgba(102, 126, 234, 0.2); border-left: 3px solid var(--accent); }
        .user-id { font-weight: 600; font-size: 14px; }
        .user-meta, .knowledge-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .delete-btn { background: transparent; border: none; color: var(--danger); cursor: pointer; font-size: 18px; opacity: 0.7; }
        .delete-btn:hover { opacity: 1; }

        .chat-view, .knowledge-view { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
        .message.user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .message.assistant { align-self: flex-start; background: var(--bg-input); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .message-time { font-size: 11px; opacity: 0.7; margin-top: 6px; text-align: right; }
        .empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-style: italic; }
        .loading { text-align: center; padding: 20px; color: var(--text-muted); }

        /* === ВКЛАДКА: БАЗА ЗНАНИЙ === */
        .knowledge-dashboard { display: grid; grid-template-columns: 300px 1fr; gap: 20px; height: calc(100vh - 240px); }
        
        .file-item {
            padding: 15px 20px; border-bottom: 1px solid var(--border); cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }
        .file-item:hover { background: rgba(46, 204, 113, 0.1); }
        .file-item.active { background: rgba(46, 204, 113, 0.2); border-left: 3px solid var(--success); }
        .file-name { font-weight: 600; font-size: 14px; color: var(--success); }
        .file-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        .knowledge-text {
            background: var(--bg-input); padding: 20px; border-radius: 12px;
            border: 1px solid var(--border); font-size: 14px; line-height: 1.6;
            white-space: pre-wrap; word-break: break-word;
        }
        .knowledge-header-info {
            display: flex; gap: 15px; align-items: center; flex-wrap: wrap;
        }
        .badge {
            padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
        }
        .badge-file { background: rgba(46, 204, 113, 0.2); color: var(--success); }
        .badge-manual { background: rgba(243, 156, 18, 0.2); color: var(--warning); }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--bg-input); border-radius: 4px; }

        @media (max-width: 768px) {
            .dashboard, .knowledge-dashboard { grid-template-columns: 1fr; height: auto; }
            .panel { height: 50vh; }
        }
    </style>
</head>
<body>

    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h2>🔐 Вход в админ-панель</h2>
            <input type="password" id="tokenInput" class="login-input" placeholder="Введите ADMIN_TOKEN" onkeypress="if(event.key==='Enter') login()">
            <label class="remember-me">
                <input type="checkbox" id="rememberMe" checked> Запомнить меня
            </label>
            <button onclick="login()" class="login-btn">Войти</button>
            <div id="loginError" class="login-error"></div>
        </div>
    </div>

    <div id="adminPanel" class="admin-container">
        <div class="header">
            <h1>🔐 Админ-панель Феон</h1>
            <div class="stats">
                <div class="stat-box"><div class="number" id="totalUsers">0</div><div class="label">Пользователей</div></div>
                <div class="stat-box"><div class="number" id="totalMessages">0</div><div class="label">Сообщений</div></div>
                <div class="stat-box"><div class="number" id="totalKnowledge">0</div><div class="label">Фрагментов знаний</div></div>
                <div class="stat-box"><div class="number" id="totalFiles">0</div><div class="label">Файлов в БЗ</div></div>
            </div>
            <button onclick="logout()" class="logout-btn">🚪 Выйти</button>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('chats')">💬 История чатов</button>
            <button class="tab" onclick="switchTab('knowledge')">📚 База знаний</button>
        </div>

        <!-- ВКЛАДКА: ИСТОРИЯ ЧАТОВ -->
        <div id="tab-chats" class="tab-content active">
            <div class="dashboard">
                <div class="panel">
                    <div class="panel-header">
                        <span>Пользователи</span>
                        <button onclick="loadUsers()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-size:18px;">🔄</button>
                    </div>
                    <div id="userList" class="user-list"><div class="loading">Загрузка...</div></div>
                </div>
                <div class="panel">
                    <div class="panel-header">
                        <span id="chatHeaderTitle">Выберите пользователя</span>
                        <button id="deleteChatBtn" onclick="deleteCurrentUser()" class="logout-btn" style="padding: 5px 10px; font-size: 12px; display: none;">🗑 Удалить чат</button>
                    </div>
                    <div id="chatView" class="chat-view">
                        <div class="empty-state">Выберите пользователя слева</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ВКЛАДКА: БАЗА ЗНАНИЙ -->
        <div id="tab-knowledge" class="tab-content">
            <div class="knowledge-dashboard">
                <div class="panel">
                    <div class="panel-header">
                        <span>📁 Файлы</span>
                        <button onclick="loadKnowledge()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-size:18px;">🔄</button>
                    </div>
                    <div id="fileList" class="knowledge-list"><div class="loading">Загрузка...</div></div>
                </div>
                <div class="panel">
                    <div class="panel-header">
                        <div class="knowledge-header-info">
                            <span id="knowledgeHeaderTitle">Выберите файл или фрагмент</span>
                            <span id="knowledgeBadge"></span>
                        </div>
                        <button id="deleteFileBtn" onclick="deleteCurrentFile()" class="logout-btn" style="padding: 5px 10px; font-size: 12px; display: none;">🗑 Удалить файл</button>
                    </div>
                    <div id="knowledgeView" class="knowledge-view">
                        <div class="empty-state">Выберите файл слева, чтобы увидеть его содержимое</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://docker-new-chat.onrender.com';
        let adminToken = '';
        let currentUserId = null;
        let currentFile = null;
        let allKnowledge = [];

        document.addEventListener('DOMContentLoaded', () => {
            const savedToken = localStorage.getItem('feon_admin_token') || sessionStorage.getItem('feon_admin_token');
            if (savedToken) {
                adminToken = savedToken;
                showAdminPanel();
            }
        });

        async function login() {
            const token = document.getElementById('tokenInput').value.trim();
            const remember = document.getElementById('rememberMe').checked;
            const errorEl = document.getElementById('loginError');
            
            if (!token) { errorEl.textContent = '❌ Введите токен!'; errorEl.style.display = 'block'; return; }
            errorEl.style.display = 'none';
            
            try {
                const response = await fetch(`${API_BASE}/get_all_users`, { headers: { 'x-admin-token': token } });
                if (response.status === 401) { errorEl.textContent = '❌ Неверный токен!'; errorEl.style.display = 'block'; return; }
                if (!response.ok) throw new Error('Server error');
                
                adminToken = token;
                if (remember) localStorage.setItem('feon_admin_token', token);
                else sessionStorage.setItem('feon_admin_token', token);
                showAdminPanel();
            } catch (error) {
                errorEl.textContent = `❌ Ошибка: ${error.message}`;
                errorEl.style.display = 'block';
            }
        }

        function showAdminPanel() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadUsers();
            loadKnowledge();
        }

        function logout() {
            if (confirm('Выйти из админ-панели?')) {
                localStorage.removeItem('feon_admin_token');
                sessionStorage.removeItem('feon_admin_token');
                location.reload();
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        // ==================== ИСТОРИЯ ЧАТОВ ====================
        async function loadUsers() {
            const userListEl = document.getElementById('userList');
            userListEl.innerHTML = '<div class="loading">Загрузка...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/get_all_users`, { headers: { 'x-admin-token': adminToken } });
                if (response.status === 401) { alert('Сессия истекла!'); logout(); return; }
                const data = await response.json();
                const users = data.users || [];
                
                document.getElementById('totalUsers').textContent = users.length;
                let totalMsgs = users.reduce((sum, u) => sum + (u.message_count || 0), 0);
                document.getElementById('totalMessages').textContent = totalMsgs;
                
                if (users.length === 0) { userListEl.innerHTML = '<div class="empty-state">Нет пользователей</div>'; return; }
                
                userListEl.innerHTML = users.map(user => `
                    <div class="user-item ${currentUserId === user.user_id ? 'active' : ''}" onclick="selectUser('${user.user_id}')">
                        <div style="flex:1">
                            <div class="user-id">${escapeHtml(user.user_id)}</div>
                            <div class="user-meta">${user.message_count || 0} сообщ. • ${user.last_activity ? new Date(user.last_activity).toLocaleString('ru-RU') : 'Неактивен'}</div>
                        </div>
                        <button class="delete-btn" onclick="event.stopPropagation(); deleteUser('${user.user_id}')">🗑</button>
                    </div>
                `).join('');
            } catch (error) {
                userListEl.innerHTML = `<div class="loading" style="color: var(--danger)">Ошибка: ${error.message}</div>`;
            }
        }

        async function selectUser(userId) {
            currentUserId = userId;
            document.getElementById('chatHeaderTitle').textContent = `Чат: ${userId}`;
            document.getElementById('deleteChatBtn').style.display = 'block';
            const chatViewEl = document.getElementById('chatView');
            chatViewEl.innerHTML = '<div class="loading">Загрузка...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/get_history?user_id=${encodeURIComponent(userId)}`, { headers: { 'x-admin-token': adminToken } });
                if (response.status === 401) { logout(); return; }
                const data = await response.json();
                const messages = data.messages || [];
                
                if (messages.length === 0) { chatViewEl.innerHTML = '<div class="empty-state">История пуста</div>'; return; }
                
                chatViewEl.innerHTML = messages.map(msg => `
                    <div class="message ${msg.role === 'user' ? 'user' : 'assistant'}">
                        <div>${escapeHtml(msg.content).replace(/\n/g, '<br>')}</div>
                        <div class="message-time">${msg.timestamp ? new Date(msg.timestamp).toLocaleString('ru-RU') : ''}</div>
                    </div>
                `).join('');
                chatViewEl.scrollTop = chatViewEl.scrollHeight;
            } catch (error) {
                chatViewEl.innerHTML = `<div class="loading" style="color: var(--danger)">Ошибка: ${error.message}</div>`;
            }
        }

        async function deleteUser(userId) {
            if (!confirm(`Удалить пользователя ${userId}?`)) return;
            try {
                await fetch(`${API_BASE}/delete_user?user_id=${encodeURIComponent(userId)}`, { method: 'DELETE', headers: { 'x-admin-token': adminToken } });
                if (currentUserId === userId) {
                    currentUserId = null;
                    document.getElementById('chatView').innerHTML = '<div class="empty-state">Выберите пользователя слева</div>';
                }
                loadUsers();
            } catch (e) { alert('Ошибка'); }
        }

        function deleteCurrentUser() { if (currentUserId) deleteUser(currentUserId); }

        // ==================== БАЗА ЗНАНИЙ ====================
        async function loadKnowledge() {
            const fileListEl = document.getElementById('fileList');
            fileListEl.innerHTML = '<div class="loading">Загрузка...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/get_all_knowledge`, { headers: { 'x-admin-token': adminToken } });
                if (response.status === 401) { logout(); return; }
                const data = await response.json();
                
                allKnowledge = data.knowledge || [];
                const files = data.files || [];
                
                document.getElementById('totalKnowledge').textContent = data.total || 0;
                document.getElementById('totalFiles').textContent = files.length;
                
                if (files.length === 0) { fileListEl.innerHTML = '<div class="empty-state">База знаний пуста</div>'; return; }
                
                fileListEl.innerHTML = files.map(file => `
                    <div class="file-item ${currentFile === file.name ? 'active' : ''}" onclick="selectFile('${escapeHtml(file.name)}')">
                        <div style="flex:1">
                            <div class="file-name">${file.name === 'Ручной ввод' ? '✍️ Ручной ввод' : '📄 ' + escapeHtml(file.name)}</div>
                            <div class="file-meta">${file.chunks} фрагментов • ${file.total_length} символов</div>
                        </div>
                        <button class="delete-btn" onclick="event.stopPropagation(); deleteFile('${escapeHtml(file.name)}')">🗑</button>
                    </div>
                `).join('');
            } catch (error) {
                fileListEl.innerHTML = `<div class="loading" style="color: var(--danger)">Ошибка: ${error.message}</div>`;
            }
        }

        function selectFile(fileName) {
            currentFile = fileName;
            const isManual = fileName === 'Ручной ввод';
            document.getElementById('knowledgeHeaderTitle').textContent = isManual ? '✍️ Ручной ввод' : `📄 ${fileName}`;
            document.getElementById('knowledgeBadge').innerHTML = isManual 
                ? '<span class="badge badge-manual">Ручной ввод</span>'
                : `<span class="badge badge-file">Файл</span>`;
            document.getElementById('deleteFileBtn').style.display = 'block';
            
            const knowledgeViewEl = document.getElementById('knowledgeView');
            const fragments = allKnowledge.filter(k => k.source_file === fileName);
            
            if (fragments.length === 0) {
                knowledgeViewEl.innerHTML = '<div class="empty-state">Нет фрагментов</div>';
                return;
            }
            
            knowledgeViewEl.innerHTML = fragments.map((frag, idx) => `
                <div style="background: var(--bg-input); padding: 15px; border-radius: 12px; border: 1px solid var(--border);">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <strong style="color: var(--accent);">Фрагмент #${idx + 1}</strong>
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <span style="font-size: 12px; color: var(--text-muted);">${frag.length} символов</span>
                            <button class="delete-btn" onclick="deleteKnowledge(${frag.id})" title="Удалить фрагмент">🗑</button>
                        </div>
                    </div>
                    <div class="knowledge-text">${escapeHtml(frag.text)}</div>
                </div>
            `).join('');
        }

        async function deleteKnowledge(id) {
            if (!confirm('Удалить этот фрагмент?')) return;
            try {
                await fetch(`${API_BASE}/delete_knowledge`, {
                    method: 'DELETE',
                    headers: { 'x-admin-token': adminToken, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id })
                });
                loadKnowledge();
            } catch (e) { alert('Ошибка'); }
        }

        async function deleteFile(fileName) {
            if (!confirm(`Удалить ВСЕ фрагменты из файла "${fileName}"?`)) return;
            try {
                await fetch(`${API_BASE}/delete_file_knowledge?file_name=${encodeURIComponent(fileName)}`, {
                    method: 'DELETE',
                    headers: { 'x-admin-token': adminToken }
                });
                currentFile = null;
                document.getElementById('knowledgeView').innerHTML = '<div class="empty-state">Выберите файл слева</div>';
                loadKnowledge();
            } catch (e) { alert('Ошибка'); }
        }

        function deleteCurrentFile() { if (currentFile) deleteFile(currentFile); }

        function escapeHtml(text) {
            if (!text) return '';
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
